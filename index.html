<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>My Portfolio</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #6b73ff, #000dff);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: all 0.3s ease;
        }
        h1 {
            font-size: 3rem;
            animation: fadeIn 2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .project-card {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .typography {
            font-size: 1.5rem;
            line-height: 1.6;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            .typography {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <h1>Welcome to My Professional Portfolio</h1>
    <div class="project-card">
        <h2>Project Title</h2>
        <p class="typography">A brief description of the project can go here. Use this area to highlight your skills and experiences.</p>
    </div>
    <div class="project-card">
        <h2>Another Project Title</h2>
        <p class="typography">Details about another project, showcasing your expertise and accomplishments.</p>
    </div>
</body>
</html>
