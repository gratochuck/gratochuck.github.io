<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1e1e2f;
            color: #ffffff;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.5rem;
        }
        .typewriter {
            overflow: hidden;
            border-right: 0.15em solid;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: 0.15em;
            animation: typing 3s steps(30, end),
                       blink-caret 0.75s step-end infinite;
        }
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #ffffff; }
        }
    </style>
</head>
<body>
    <nav class="sticky top-0 bg-gray-800 text-white p-4">
        <div class="container mx-auto flex justify-between">
            <h1 class="text-2xl font-bold">My Portfolio</h1>
            <ul class="flex space-x-4">
                <li><a href="#projects">Projects</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>
    <section class="text-center py-10">
        <div class="typewriter">Welcome to My Portfolio</div>
    </section>
    <section id="skills" class="p-10">
        <h2 class="text-3xl mb-5">Skills</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="card p-5">
                <h3>HTML</h3>
            </div>
            <div class="card p-5">
                <h3>CSS</h3>
            </div>
            <div class="card p-5">
                <h3>JavaScript</h3>
            </div>
            <div class="card p-5">
                <h3>React</h3>
            </div>
            <!-- More skills can be added here -->
        </div>
    </section>
    <section id="projects" class="p-10">
        <h2 class="text-3xl mb-5">Projects</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="card p-5">
                <h3>Project 1</h3>
                <p>Description of project 1.</p>
            </div>
            <div class="card p-5">
                <h3>Project 2</h3>
                <p>Description of project 2.</p>
            </div>
            <div class="card p-5">
                <h3>Project 3</h3>
                <p>Description of project 3.</p>
            </div>
            <!-- More project cards can be added here -->
        </div>
    </section>
    <footer class="p-4 bg-gray-800 text-white text-center">
        <p>&copy; 2026 My Portfolio</p>
    </footer>
</body>
</html>
